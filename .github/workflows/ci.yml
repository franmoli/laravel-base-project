name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  PHP_VERSION: '8.5'
  # Hosting compartido de Hostinger (CloudLinux) resuelve el `php`/`composer`
  # del PATH a una versión vieja (8.0). Los binarios reales por versión
  # viven en /opt/alt/phpXX/usr/bin/. Si el servidor de deploy no es
  # Hostinger shared hosting, ajustá estos dos valores (o dejalos en
  # simplemente "php"/"composer" si el PATH remoto ya resuelve bien).
  SERVER_PHP_BIN: /opt/alt/php83/usr/bin/php
  SERVER_COMPOSER_BIN: /opt/alt/php83/usr/bin/composer

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, intl, pcntl, pdo_mysql

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --ansi

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test -v

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --parallel --compact

  deploy:
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check Hostinger secrets are configured
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: echo "ready=${{ env.SSH_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.ready == 'true'

      - uses: shivammathur/setup-php@v2
        if: steps.check.outputs.ready == 'true'
        with:
          php-version: ${{ env.PHP_VERSION }}

      - uses: actions/setup-node@v7
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        if: steps.check.outputs.ready == 'true'
        run: composer install --no-progress --prefer-dist --ansi

      - name: Build frontend assets
        if: steps.check.outputs.ready == 'true'
        run: |
          npm ci
          npm run build

      - name: Upload built assets
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Hostinger (shared hosting) puede aplicar bloqueos temporales por
          # IP en su gateway SSH, o el nodo compartido puede tener picos de
          # carga que hacen expirar el ConnectTimeout. Backoff creciente
          # (30s/60s/120s) para dar margen real a que eso se resuelva solo,
          # en vez de 3 reintentos pegados que fallan siempre igual.
          for attempt in 1 2 3 4; do
            rsync -az --delete \
              -e "ssh -i /tmp/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              public/build/ \
              "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/public/build/" \
            && { echo "Upload succeeded on attempt $attempt"; break; } \
            || { echo "Attempt $attempt failed"; [ $attempt -lt 4 ] && sleep $((30 * attempt)); }
          done
          rm -f /tmp/deploy_key

      - name: Deploy over SSH
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cat > /tmp/deploy_script.sh <<EOSCRIPT
          set -e
          cd "\$DEPLOY_PATH"
          PHP=${{ env.SERVER_PHP_BIN }}
          COMPOSER=${{ env.SERVER_COMPOSER_BIN }}
          \$PHP artisan down --render="errors::503" --retry=60 || true
          git pull origin main --ff-only
          \$COMPOSER install --no-dev --prefer-dist --optimize-autoloader
          \$PHP artisan migrate --force
          \$PHP artisan optimize:clear
          \$PHP artisan config:cache
          \$PHP artisan route:cache
          \$PHP artisan view:cache
          \$PHP artisan queue:restart || true
          \$PHP artisan up
          EOSCRIPT
          # Mismo backoff creciente que en la subida de assets: si el
          # timeout es por bloqueo temporal de IP o carga del nodo
          # compartido, reintentar pegado no ayuda en nada.
          for attempt in 1 2 3 4; do
            ssh -i /tmp/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" < /tmp/deploy_script.sh \
            && { echo "Deploy succeeded on attempt $attempt"; break; } \
            || { echo "Attempt $attempt failed"; [ $attempt -lt 4 ] && sleep $((30 * attempt)); }
          done
          rm -f /tmp/deploy_key /tmp/deploy_script.sh

  deploy-staging:
    needs: tests
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Check Hostinger secrets are configured
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: echo "ready=${{ env.SSH_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.ready == 'true'

      - uses: shivammathur/setup-php@v2
        if: steps.check.outputs.ready == 'true'
        with:
          php-version: ${{ env.PHP_VERSION }}

      - uses: actions/setup-node@v7
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        if: steps.check.outputs.ready == 'true'
        run: composer install --no-progress --prefer-dist --ansi

      - name: Build frontend assets
        if: steps.check.outputs.ready == 'true'
        run: |
          npm ci
          npm run build

      - name: Upload built assets
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Ver comentario equivalente en el job "deploy" sobre el backoff
          # creciente (30s/60s/120s).
          for attempt in 1 2 3 4; do
            rsync -az --delete \
              -e "ssh -i /tmp/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              public/build/ \
              "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/public/build/" \
            && { echo "Upload succeeded on attempt $attempt"; break; } \
            || { echo "Attempt $attempt failed"; [ $attempt -lt 4 ] && sleep $((30 * attempt)); }
          done
          rm -f /tmp/deploy_key

      - name: Deploy over SSH
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cat > /tmp/deploy_script.sh <<EOSCRIPT
          set -e
          cd "\$DEPLOY_PATH"
          PHP=${{ env.SERVER_PHP_BIN }}
          COMPOSER=${{ env.SERVER_COMPOSER_BIN }}
          \$PHP artisan down --render="errors::503" --retry=60 || true
          git pull origin dev --ff-only
          \$COMPOSER install --no-dev --prefer-dist --optimize-autoloader
          \$PHP artisan migrate --force
          \$PHP artisan optimize:clear
          \$PHP artisan config:cache
          \$PHP artisan route:cache
          \$PHP artisan view:cache
          \$PHP artisan queue:restart || true
          \$PHP artisan up
          EOSCRIPT
          # Mismo backoff creciente que en la subida de assets: si el
          # timeout es por bloqueo temporal de IP o carga del nodo
          # compartido, reintentar pegado no ayuda en nada.
          for attempt in 1 2 3 4; do
            ssh -i /tmp/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" < /tmp/deploy_script.sh \
            && { echo "Deploy succeeded on attempt $attempt"; break; } \
            || { echo "Attempt $attempt failed"; [ $attempt -lt 4 ] && sleep $((30 * attempt)); }
          done
          rm -f /tmp/deploy_key /tmp/deploy_script.sh
